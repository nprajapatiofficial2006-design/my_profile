name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Code/package.json

      - name: Install dependencies
        run: npm install
        working-directory: Code

      - name: Build
        run: npm run build
        working-directory: Code

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: Code/dist
          branch: gh-pages
