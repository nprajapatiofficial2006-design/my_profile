<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nisha Prajapati | Graphic Designer</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Icon Library -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --primary: #9F0BE1;
      --bg-black: #000000;
      --bg-dark-grey: #2B2B2B;
      --text-white: #FFFFFF;
      --text-grey: #cccccc;
      --font-main: 'Outfit', sans-serif;
      --transition: all 0.3s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-main);
      background-color: var(--bg-black);
      color: var(--text-white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    ul {
      list-style: none;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      outline: none;
      background: none;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .section-padding {
      padding: 80px 0;
    }

    .text-primary {
      color: var(--primary);
    }

    .section-title {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 50px;
      position: relative;
    }

    .section-title::after {
      content: '';
      display: block;
      width: 60px;
      height: 4px;
      background-color: var(--primary);
      margin: 15px auto 0;
      border-radius: 2px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 30px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1rem;
      transition: var(--transition);
      text-align: center;
      gap: 8px;
    }

    .btn-primary {
      background-color: var(--primary);
      color: var(--text-white);
      border: 2px solid var(--primary);
    }

    .btn-primary:hover {
      background-color: transparent;
      color: var(--primary);
      box-shadow: 0 0 15px rgba(159, 11, 225, 0.4);
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      transition: var(--transition);
      padding: 20px 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
    }

    .navbar-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: white;
    }

    .nav-menu {
      display: flex;
      gap: 30px;
    }

    .nav-link {
      font-weight: 500;
      color: #ddd;
      transition: var(--transition);
    }

    .nav-link:hover {
      color: var(--primary);
    }

    .hero-section {
      background: linear-gradient(135deg, #000000 0%, #1a0525 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-top: 80px;
    }

    .hero-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 50px;
    }

    .hero-title {
      font-size: 3.5rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 20px;
    }

    .hero-image {
      width: 350px;
      height: 350px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid var(--primary);
      box-shadow: 0 0 30px rgba(159, 11, 225, 0.3);
    }

    .portfolio-section {
      background-color: var(--bg-dark-grey);
    }

    .filters {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 50px;
    }

    .filter-btn {
      background: transparent;
      color: var(--text-grey);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 8px 20px;
      border-radius: 25px;
      transition: var(--transition);
    }

    .filter-btn.active,
    .filter-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
    }

    .portfolio-item {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 4/3;
      background: #111;
      cursor: pointer;
    }

    .portfolio-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .portfolio-item:hover .portfolio-image {
      transform: scale(1.1);
    }

    .portfolio-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .portfolio-item:hover .portfolio-overlay {
      opacity: 1;
    }

    .project-title {
      color: white;
      font-size: 1.2rem;
      margin-bottom: 5px;
    }

    .project-category {
      color: var(--primary);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 40px;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox-content {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: white;
      font-size: 40px;
      cursor: pointer;
    }

    .pdf-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      padding: 20px;
    }

    .pdf-modal.active {
      display: flex;
    }

    .pdf-container {
      width: 95%;
      height: 95%;
      background: white;
      border-radius: 12px;
      position: relative;
    }

    .pdf-iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .close-pdf {
      position: absolute;
      top: -20px;
      right: -20px;
      background: var(--primary);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }

    @media (max-width: 768px) {
      .hero-container {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .hero-image {
        width: 250px;
        height: 250px;
      }
    }
  </style>
</head>

<body>
  <nav class="navbar" id="navbar">
    <div class="container navbar-container">
      <a href="#" class="logo">Nisha Prajapati</a>
      <div class="nav-menu">
        <a href="#hero" class="nav-link">Home</a>
        <a href="#portfolio" class="nav-link">Work</a>
        <a href="#contact" class="nav-link">Contact</a>
      </div>
    </div>
  </nav>

  <section id="hero" class="hero-section">
    <div class="container hero-container">
      <div class="hero-content">
        <h1 class="hero-title">Creative <span class="text-primary">Graphic Designer</span></h1>
        <p class="hero-subtitle">Transforming ideas into visually stunning realities. Specialized in branding, social
          media, and digital design.</p>
        <div class="hero-buttons">
          <a href="#portfolio" class="btn btn-primary">View My Work</a>
        </div>
      </div>
      <div class="hero-image-container">
        <img src="Image/Profile.png" alt="Nisha Prajapati" class="hero-image">
      </div>
    </div>
  </section>

  <section id="portfolio" class="portfolio-section section-padding">
    <div class="container">
      <h2 class="section-title">My Work</h2>
      <div class="filters" id="filters">
        <button class="filter-btn active" onclick="filterWork('all', this)">All</button>
        <button class="filter-btn" onclick="filterWork('social-media', this)">Social Media</button>
        <button class="filter-btn" onclick="filterWork('visiting-card', this)">Visiting Card</button>
        <button class="filter-btn" onclick="filterWork('banner', this)">Banner</button>
        <button class="filter-btn" onclick="filterWork('booklet', this)">Booklet</button>
        <button class="filter-btn" onclick="filterWork('linkedin', this)">LinkedIn</button>
        <button class="filter-btn" onclick="filterWork('ppt-design', this)">Presentation</button>
        <button class="filter-btn" onclick="filterWork('resume', this)">Resume</button>
      </div>
      <div class="portfolio-grid" id="portfolio-grid">
        <!-- Injected by JS -->
      </div>
    </div>
  </section>

  <div id="lightbox" class="lightbox" onclick="this.classList.remove('active')">
    <span class="lightbox-close">&times;</span>
    <img class="lightbox-content" id="lightbox-img">
  </div>

  <div id="pdf-modal" class="pdf-modal" onclick="this.classList.remove('active')">
    <div class="pdf-container" onclick="event.stopPropagation()">
      <button class="close-pdf"
        onclick="document.getElementById('pdf-modal').classList.remove('active')">&times;</button>
      <iframe id="pdf-iframe" class="pdf-iframe"></iframe>
    </div>
  </div>

  <script>
    lucide.createIcons();

    const portfolioData = [
      // Social Media
      { folder: 'social-media', name: 'Allura Post.png', category: 'social-media' },
      { folder: 'social-media', name: 'Beauty Cosmetic Post.png', category: 'social-media' },
      { folder: 'social-media', name: 'Femina Miss India UP Post.png', category: 'social-media' },
      { folder: 'social-media', name: 'Generic Bharat Post.png', category: 'social-media' },
      { folder: 'social-media', name: 'Gir Valley Story.png', category: 'social-media' },
      { folder: 'social-media', name: 'Goyal Brother Story.png', category: 'social-media' },
      { folder: 'social-media', name: 'Goyal Brothers Post.png', category: 'social-media' },
      { folder: 'social-media', name: 'Gri Valley Post.png', category: 'social-media' },
      { folder: 'social-media', name: 'Kunj Urban Post.png', category: 'social-media' },
      { folder: 'social-media', name: 'Saingo Travelers Post.png', category: 'social-media' },
      { folder: 'social-media', name: 'Trainscafe Post.png', category: 'social-media' },

      // Visiting Cards
      { folder: 'visiting-card', name: 'Allura Visiting Card.png', category: 'visiting-card' },
      { folder: 'visiting-card', name: 'Beauty Visiting Card.png', category: 'visiting-card' },
      { folder: 'visiting-card', name: 'Ganesh Visiting Card.jpg', category: 'visiting-card' },
      { folder: 'visiting-card', name: 'Pawan Visiting Card.png', category: 'visiting-card' },
      { folder: 'visiting-card', name: 'Resturant Visiting Card.png', category: 'visiting-card' },
      { folder: 'visiting-card', name: 'Shivendra Visiting Card.jpg', category: 'visiting-card' },
      { folder: 'visiting-card', name: 'Visiting Card.png', category: 'visiting-card' },
      { folder: 'visiting-card', name: 'Yoyomiles Visiting Card.png', category: 'visiting-card' },
      { folder: 'visiting-card', name: 'Hireprow ID Card PDF.jpeg', category: 'visiting-card', pdf: 'Hireprow Id Card.pdf' },

      // Banner
      { folder: 'banner', name: 'Allura Sanitary FB.png', category: 'banner' },
      { folder: 'banner', name: 'DR.Saurabh FB.png', category: 'banner' },
      { folder: 'banner', name: 'Femina Miss India UP FB.png', category: 'banner' },
      { folder: 'banner', name: 'Little Heart FB.png', category: 'banner' },
      { folder: 'banner', name: 'SVS foundation FB.png', category: 'banner' },
      { folder: 'banner', name: 'Yoyomiles FB.png', category: 'banner' },

      // Booklet
      { folder: 'booklet', name: 'Allura Booklet PDF.png', category: 'booklet', pdf: 'Allura Pads Booklet Design.pdf' },
      { folder: 'booklet', name: 'Book Cover Design.png', category: 'booklet' },
      { folder: 'booklet', name: 'Story book Cover.png', category: 'booklet' },

      // LinkedIn
      { folder: 'linkedin', name: 'Linkedin Post.png', category: 'linkedin' },
      { folder: 'linkedin', name: 'linkedin Profile Cover.png', category: 'linkedin' },

      // Presentation
      { folder: 'ppt-design', name: 'SVS Foundation PDF.png', category: 'ppt-design', pdf: 'SVS Foundation Design.pdf' },

      // Resume
      { folder: 'resume', name: 'Krunal Resume.png', category: 'resume' },
      { folder: 'resume', name: 'Urja Schdev Resume.png', category: 'resume' }
    ];

    function renderWork() {
      const grid = document.getElementById('portfolio-grid');
      grid.innerHTML = portfolioData.map(item => {
        const imgPath = `Standalone/images/work/${item.folder}/${encodeURIComponent(item.name)}`;
        const pdfPath = item.pdf ? `Standalone/images/work/${item.folder}/${encodeURIComponent(item.pdf)}` : null;

        return `
                    <div class="portfolio-item" data-category="${item.category}" onclick="${pdfPath ? `openPdf('${pdfPath}')` : `openImg('${imgPath}')`}">
                        <img src="${imgPath}" class="portfolio-image" loading="lazy">
                        <div class="portfolio-overlay">
                            <h3 class="project-title">${item.name.replace(/\.[^/.]+$/, "")}</h3>
                            <span class="project-category">${item.category.replace('-', ' ')}</span>
                            ${pdfPath ? '<span style="color:white; font-size:10px; background:var(--primary); padding:2px 6px; border-radius:4px; margin-top:5px; width:fit-content;">PDF Available</span>' : ''}
                        </div>
                    </div>
                `;
      }).join('');
    }

    function filterWork(cat, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      document.querySelectorAll('.portfolio-item').forEach(item => {
        if (cat === 'all' || item.dataset.category === cat) {
          item.style.display = 'block';
        } else {
          item.style.display = 'none';
        }
      });
    }

    function openImg(src) {
      const lb = document.getElementById('lightbox');
      document.getElementById('lightbox-img').src = src;
      lb.classList.add('active');
    }

    function openPdf(src) {
      const modal = document.getElementById('pdf-modal');
      document.getElementById('pdf-iframe').src = src;
      modal.classList.add('active');
    }

    renderWork();
  </script>
</body>

</html>
